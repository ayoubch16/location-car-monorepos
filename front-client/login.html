<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoLoc — Connexion / Inscription</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body class="auth-page">

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header class="site-header">
    <div class="header-inner">
        <a href="index.html" class="logo"><span class="icon">🚗</span> AutoLoc</a>
        <nav class="site-nav">
            <a href="index.html" class="nav-link">← Retour aux voitures</a>
        </nav>
    </div>
</header>

<!-- ── Hero ────────────────────────────────────────────────────────────────── -->
<div class="auth-hero">
    <h1>Espace Client</h1>
    <p>Connectez-vous ou créez un compte pour réserver</p>
</div>

<!-- ── Card ────────────────────────────────────────────────────────────────── -->
<div class="auth-card-wrap">
    <div class="auth-card">

        <!-- Onglets -->
        <div class="tabs">
            <button class="tab-btn active" id="tab-login-btn"    onclick="switchTab('login')">Connexion</button>
            <button class="tab-btn"        id="tab-register-btn" onclick="switchTab('register')">Inscription</button>
        </div>

        <!-- ── Onglet Connexion ────────────────────────────────────────────── -->
        <div class="tab-pane active" id="tab-login">
            <div id="login-alert" class="alert alert-danger hidden"></div>

            <form id="form-login" novalidate>
                <div class="form-group mb-4">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" type="email" id="email" name="email"
                           placeholder="votre@email.com" autocomplete="email" required>
                </div>
                <div class="form-group mb-6">
                    <label class="form-label" for="password">Mot de passe</label>
                    <input class="form-input" type="password" id="password" name="password"
                           placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
                    Se connecter
                </button>
            </form>

            <p class="text-center text-sm text-muted mt-4">
                Pas encore de compte ?
                <a href="#" onclick="switchTab('register'); return false;"
                   style="color:var(--primary);font-weight:600">Créer un compte</a>
            </p>
        </div>

        <!-- ── Onglet Inscription ──────────────────────────────────────────── -->
        <div class="tab-pane" id="tab-register">
            <div id="register-alert" class="alert hidden"></div>

            <form id="form-register" novalidate>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem" class="mb-4">
                    <div class="form-group">
                        <label class="form-label" for="prenom">Prénom</label>
                        <input class="form-input" type="text" id="prenom" name="prenom"
                               placeholder="Ali" autocomplete="given-name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="nom">Nom</label>
                        <input class="form-input" type="text" id="nom" name="nom"
                               placeholder="Alami" autocomplete="family-name" required>
                    </div>
                </div>
                <div class="form-group mb-4">
                    <label class="form-label" for="reg-email">Email</label>
                    <input class="form-input" type="email" id="reg-email" name="email"
                           placeholder="votre@email.com" autocomplete="email" required>
                </div>
                <div class="form-group mb-4">
                    <label class="form-label" for="telephone">Téléphone</label>
                    <input class="form-input" type="tel" id="telephone" name="telephone"
                           placeholder="06 12 34 56 78" autocomplete="tel">
                </div>
                <div class="form-group mb-4">
                    <label class="form-label" for="reg-password">Mot de passe</label>
                    <input class="form-input" type="password" id="reg-password" name="password"
                           placeholder="••••••••" autocomplete="new-password" required>
                </div>
                <div class="form-group mb-6">
                    <label class="form-label" for="password_confirmation">Confirmer le mot de passe</label>
                    <input class="form-input" type="password" id="password_confirmation" name="password_confirmation"
                           placeholder="••••••••" autocomplete="new-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg" id="register-btn">
                    Créer mon compte
                </button>
            </form>

            <p class="text-center text-sm text-muted mt-4">
                Déjà un compte ?
                <a href="#" onclick="switchTab('login'); return false;"
                   style="color:var(--primary);font-weight:600">Se connecter</a>
            </p>
        </div>
    </div>
</div>

<script src="assets/app.js"></script>
<script>
// Redirect si déjà connecté
if (auth.isLoggedIn()) {
    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('redirect') || 'index.html';
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab + '-btn').classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    clearFieldErrors();
}

// ── Connexion ────────────────────────────────────────────────────────────────
document.getElementById('form-login').addEventListener('submit', async e => {
    e.preventDefault();
    clearFieldErrors();

    const alertEl = document.getElementById('login-alert');
    alertEl.classList.add('hidden');
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Connexion…';

    try {
        const data = await apiPost('/auth/login', {
            email:    document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
        });

        auth.setToken(data.access_token);
        auth.setUser(data.user);

        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect');
        window.location.href = redirect || 'index.html';

    } catch (err) {
        btn.disabled    = false;
        btn.textContent = 'Se connecter';

        if (err.status === 422) {
            showApiErrors(err.data);
        } else if (err.status === 401) {
            alertEl.textContent = 'Email ou mot de passe incorrect.';
            alertEl.classList.remove('hidden');
        } else {
            alertEl.textContent = err.message || 'Erreur de connexion. Veuillez réessayer.';
            alertEl.classList.remove('hidden');
        }
    }
});

// ── Inscription ───────────────────────────────────────────────────────────────
document.getElementById('form-register').addEventListener('submit', async e => {
    e.preventDefault();
    clearFieldErrors();

    const alertEl = document.getElementById('register-alert');
    alertEl.className = 'alert hidden';
    const btn = document.getElementById('register-btn');
    btn.disabled = true;
    btn.textContent = 'Création du compte…';

    const password = document.getElementById('reg-password').value;
    const confirm  = document.getElementById('password_confirmation').value;

    if (password !== confirm) {
        showFieldError('password_confirmation', 'Les mots de passe ne correspondent pas.');
        btn.disabled    = false;
        btn.textContent = 'Créer mon compte';
        return;
    }

    try {
        await apiPost('/auth/register', {
            prenom:                document.getElementById('prenom').value.trim(),
            nom:                   document.getElementById('nom').value.trim(),
            email:                 document.getElementById('reg-email').value.trim(),
            telephone:             document.getElementById('telephone').value.trim(),
            password,
            password_confirmation: confirm,
        });

        alertEl.textContent = '✓ Compte créé avec succès ! Vous pouvez maintenant vous connecter.';
        alertEl.className   = 'alert alert-success';
        document.getElementById('form-register').reset();
        btn.disabled    = false;
        btn.textContent = 'Créer mon compte';

        setTimeout(() => switchTab('login'), 2200);

    } catch (err) {
        btn.disabled    = false;
        btn.textContent = 'Créer mon compte';

        if (err.status === 422) {
            showApiErrors(err.data);
            alertEl.textContent = err.data?.message || 'Veuillez corriger les erreurs ci-dessous.';
            alertEl.className   = 'alert alert-danger';
        } else {
            alertEl.textContent = err.message || 'Erreur lors de l\'inscription.';
            alertEl.className   = 'alert alert-danger';
        }
    }
});
</script>
</body>
</html>
